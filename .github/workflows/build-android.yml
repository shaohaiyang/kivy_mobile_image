name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libjpeg-dev \
          libpng-dev \
          libfreetype6-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good
        sudo apt-get install -y \
          openjdk-17-jdk \
          automake \
          autoconf \
          libtool \
          pkg-config \
          libncurses-dev \
          libtinfo6 \
          cmake \
          libffi-dev \
          libssl-dev \
          lld
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Buildozer
      run: |
        pip install buildozer cython
    
    - name: Force Create Android SDK License Directory
      run: |
        # 强制创建 Buildozer 预期的 SDK 路径（哪怕现在是空的）
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        
        # 写入授权 Hash（涵盖了 build-tools 37 所需的协议）
        echo "24333f8a63b6825ea9c5573f843a509589195e65" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo "d56f5187479451e44460e3b030bedad082f7208c" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        
        # 检查确认
        ls -R /home/runner/.buildozer/android/platform/android-sdk/licenses
    
    - name: Build APK
      run: |
        buildozer -v android debug
      continue-on-error: false
      timeout-minutes: 120
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
        retention-days: 90