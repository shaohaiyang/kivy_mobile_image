name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libjpeg-dev \
          libpng-dev \
          libfreetype6-dev \
          libgstreamer1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good
        sudo apt-get install -y \
          openjdk-17-jdk \
          automake \
          autoconf \
          libtool \
          pkg-config \
          libncurses-dev \
          libtinfo6 \
          cmake \
          libffi-dev \
          libssl-dev \
          lld
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Install Buildozer
      run: |
        pip install buildozer cython
    
    - name: Install Android SDK and accept licenses
      run: |
        # 下载并安装 Android Command Line Tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip -d /tmp/cmdline-tools
        mkdir -p ~/Android/sdk/cmdline-tools/latest
        mv /tmp/cmdline-tools/cmdline-tools/* ~/Android/sdk/cmdline-tools/latest/
        
        # 设置环境变量
        export ANDROID_HOME=~/Android/sdk
        export PATH=$PATH:$ANDROID/sdk/cmdline-tools/latest/bin:$ANDROID/sdk/platform-tools
        
        # 使用 sdkmanager 安装必要的包
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        
        # 创建 Buildozer 需要的许可证目录
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        cp -r $ANDROID_HOME/licenses/* ~/.buildozer/android/platform/android-sdk/licenses/ || true
    
    - name: Build APK
      run: |
        buildozer -v android debug
      continue-on-error: false
      timeout-minutes: 120
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
        retention-days: 90